name: 生成贪吃蛇贡献图

on:
  # 每天 UTC 00:00 自动重新生成（你的贡献图变了，蛇也会跟着更新）
  schedule:
    - cron: "0 0 * * *"
  # 允许在 Actions 页面手动点击运行
  workflow_dispatch:
  # 每次推送到 main 也触发一次，方便首次立刻看到效果
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 生成 svg 动画
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23cba6f7

      - name: 推送到 output 分支
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
